<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg">
  <title>{{ page.title }} - AI 编程实战笔记</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background: #f5f5f5;
      min-height: 100vh;
    }
    .header {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      padding: 1.5rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .header a {
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header a:hover {
      opacity: 0.8;
    }
    .header svg {
      width: 32px;
      height: 32px;
    }
    .header span {
      color: white;
      font-weight: 600;
    }
    .content {
      padding: 2rem;
    }
  </style>
</head>
<body>
  <header class="header">
    <a href="{{ site.baseurl }}/">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="hGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#667eea"/>
            <stop offset="100%" style="stop-color:#764ba2"/>
          </linearGradient>
        </defs>
        <rect width="64" height="64" rx="12" fill="url(#hGrad)"/>
        <circle cx="32" cy="28" r="10" fill="none" stroke="white" stroke-width="2.5"/>
        <circle cx="32" cy="28" r="3" fill="white"/>
        <path d="M22 40 Q32 47 42 40" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      </svg>
      <span>AI 编程实战笔记</span>
    </a>
  </header>
  
  <div class="content">
    {{ content }}
  </div>
</body>
</html>
