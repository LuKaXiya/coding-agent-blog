<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg">
  <title>{{ page.title }} - AI 编程实战笔记</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      line-height: 1.6;
      color: #333;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
    }
    .page-container {
      max-width: 700px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }
    .page-header {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .page-header h1 {
      font-size: 1.8rem;
      color: #333;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.75rem;
    }
    .page-content {
      background: white;
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    .page-content h2 {
      font-size: 1.2rem;
      color: #667eea;
      margin: 1.5rem 0 1rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #f0f0f5;
    }
    .page-content h2:first-child {
      margin-top: 0;
    }
    .page-content p {
      color: #666;
      line-height: 1.8;
      margin-bottom: 1rem;
    }
    .page-content ul {
      list-style: none;
      padding: 0;
    }
    .page-content li {
      padding: 0.5rem 0;
      color: #666;
      border-bottom: 1px solid #f5f5f5;
    }
    .page-content li:last-child {
      border-bottom: none;
    }
    .page-content a {
      color: #667eea;
      text-decoration: none;
    }
    .page-content a:hover {
      text-decoration: underline;
    }
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
      padding: 0.75rem 1.5rem;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-decoration: none;
      border-radius: 25px;
      font-size: 0.9rem;
    }
    .back-link:hover {
      opacity: 0.9;
      text-decoration: none;
    }
  </style>
</head>
<body>
  <div class="page-container">
    <header class="page-header">
      <h1>
        <svg width="36" height="36" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="hGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%" style="stop-color:#667eea"/>
              <stop offset="100%" style="stop-color:#764ba2"/>
            </linearGradient>
          </defs>
          <rect width="64" height="64" rx="12" fill="url(#hGrad2)"/>
          <circle cx="32" cy="28" r="10" fill="none" stroke="white" stroke-width="2.5"/>
          <circle cx="32" cy="28" r="3" fill="white"/>
          <path d="M22 40 Q32 47 42 40" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        </svg>
        {{ page.title }}
      </h1>
    </header>
    
    <div class="page-content">
      {{ content }}
      <a href="{{ site.baseurl }}/" class="back-link">← 返回首页</a>
    </div>
  </div>
</body>
</html>
