<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="{{ site.baseurl }}/favicon.svg">
  <title>{{ page.title }} - AI 编程实战笔记</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.6;
      color: #333;
    }
    h1 { color: #1a1a1a; }
    h2 { color: #333; border-bottom: 1px solid #eee; padding-bottom: 0.5rem; }
    a { color: #0066cc; text-decoration: none; }
    a:hover { color: #0055aa; text-decoration: underline; }
    .post-list { list-style: none; padding: 0; }
    .post-list li { margin: 0.5em 0; }
    .post-list a { font-size: 1.1em; }
    .post-list .date { color: #888; font-size: 0.9em; }
    .back-link { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; color: #888; }
  </style>
</head>
<body>
  {{ content }}
</body>
</html>
