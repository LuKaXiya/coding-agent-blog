<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ page.title }} - AI 编程实战笔记</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      max-width: 800px;
      margin: 0 auto;
      padding: 2rem;
      line-height: 1.6;
      color: #333;
    }
    h1 { color: #1a1a1a; border-bottom: 2px solid #0066cc; padding-bottom: 0.5rem; }
    h2, h3 { color: #333; }
    code { background: #f4f4f4; padding: 0.2em 0.4em; border-radius: 3px; }
    pre { background: #f4f4f4; padding: 1rem; overflow-x: auto; border-radius: 5px; }
    pre code { background: none; padding: 0; }
    blockquote { border-left: 4px solid #0066cc; margin: 1em 0; padding-left: 1em; color: #666; }
    table { border-collapse: collapse; width: 100%; margin: 1em 0; }
    th, td { border: 1px solid #ddd; padding: 0.5em; text-align: left; }
    th { background: #f4f4f4; }
    a { color: #0066cc; }
    a:hover { color: #0055aa; }
    .post-meta { color: #888; font-size: 0.9em; margin-bottom: 2rem; }
    .post-content { margin-top: 2rem; }
    .back-link { margin-top: 3rem; padding-top: 1rem; border-top: 1px solid #eee; }
    hr { border: none; border-top: 1px solid #eee; margin: 2rem 0; }
  </style>
</head>
<body>
  <article>
    <header>
      <h1>{{ page.title }}</h1>
      <p class="post-meta">发布于 {{ page.date | date: "%Y年%m月%d日" }}</p>
    </header>
    
    <div class="post-content">
      {{ content }}
    </div>
    
    <div class="back-link">
      <a href="{{ site.baseurl }}/">← 返回首页</a>
    </div>
  </article>
</body>
</html>
