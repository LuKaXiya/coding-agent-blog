title: AI 编程实战笔记
description: 后端程序员的 AI 协同开发实战指南
theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

permalink: /:title/

markdown: kramdown
kramdown:
  syntax_highlighter: rouge

minima:
  skin: dark
  author: LuKaXiya
  social:
    github: LuKaXiya
    twitter: LuKaXiya

header-pages:
  - index.md
  - about.md

collections:
  posts:
    title: Posts
    output: true
    permalink: /posts/:path/

defaults:
  - scope:
      path: "_posts"
      type: posts
    values:
      layout: post
      permalink: /posts/:title/
  - scope:
      path: "docs"
    values:
      layout: page
